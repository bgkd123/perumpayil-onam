<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perumpayil · Coming Soon</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, -apple-system, system-ui, sans-serif;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0c29, #1a1a3e, #24243e);
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(255, 215, 0, 0.06) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(255, 100, 0, 0.04) 0%, transparent 40%);
            animation: rotateBg 25s linear infinite;
            z-index: 0;
        }
        
        @keyframes rotateBg {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(360deg) scale(1.2); }
        }
        
        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }
        
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 215, 0, 0.2);
            border-radius: 50%;
            animation: floatParticle 10s ease-in-out infinite;
            z-index: 0;
        }
        
        @keyframes floatParticle {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.2; }
            50% { transform: translateY(-120px) scale(2); opacity: 0.6; }
        }
        
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 50px 40px;
            max-width: 650px;
            width: 100%;
        }
        
        .logo-icon {
            display: inline-block;
            font-size: 4.5rem;
            color: #ffd700;
            margin-bottom: 15px;
            animation: pulseIcon 2.5s ease-in-out infinite;
        }
        
        @keyframes pulseIcon {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        
        .brand {
            font-size: 3.2rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }
        
        .brand span {
            color: #ffd700;
        }
        
        .brand-sub {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }
        
        .brand-sub .est {
            color: rgba(255, 215, 0, 0.5);
            letter-spacing: 2px;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 28px;
            border-radius: 50px;
            background: rgba(255, 215, 0, 0.08);
            border: 1px solid rgba(255, 215, 0, 0.2);
            color: #ffd700;
            font-weight: 500;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 25px;
            animation: pulseBadge 2s ease-in-out infinite;
        }
        
        @keyframes pulseBadge {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .status-badge .dot {
            width: 8px;
            height: 8px;
            background: #ffd700;
            border-radius: 50%;
            animation: blinkDot 1.4s ease-in-out infinite;
        }
        
        @keyframes blinkDot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }
        
        .message {
            font-size: 1.4rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.75);
            line-height: 1.6;
            margin-bottom: 8px;
        }
        
        .message strong {
            color: #ffffff;
            font-weight: 600;
        }
        
        .message-sub {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 35px;
        }
        
        .progress-container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto 10px;
            height: 4px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            border-radius: 4px;
            animation: progressAnim 3s ease-in-out infinite;
        }
        
        @keyframes progressAnim {
            0% { width: 0%; transform: translateX(-100%); }
            50% { width: 70%; transform: translateX(0); }
            100% { width: 0%; transform: translateX(100%); }
        }
        
        .progress-label {
            display: flex;
            justify-content: center;
            gap: 30px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }
        
        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.3), transparent);
            margin: 0 auto 30px;
        }
        
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 5px;
        }
        
        .btn {
            padding: 12px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid transparent;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }
        
        .btn:active {
            transform: translateY(0px);
        }
        
        .btn-primary {
            background: #ffd700;
            color: #1a1a2e;
        }
        
        .btn-primary:hover {
            background: #ffe44d;
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.25);
        }
        
        .btn-whatsapp {
            background: #25D366;
            color: #ffffff;
        }
        
        .btn-whatsapp:hover {
            background: #20bd5a;
            box-shadow: 0 8px 30px rgba(37, 211, 102, 0.25);
        }
        
        .btn-instagram {
            background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            color: #ffffff;
        }
        
        .btn-instagram:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 8px 30px rgba(225, 48, 108, 0.3);
        }
        
        .btn-outline {
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.7);
            background: transparent;
        }
        
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.3);
            color: #ffffff;
        }
        
        .btn i {
            font-size: 1rem;
        }
        
        .footer {
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.15);
            font-size: 0.75rem;
            letter-spacing: 1px;
        }
        
        .footer a {
            color: rgba(255, 255, 255, 0.2);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .footer a:hover {
            color: rgba(255, 215, 0, 0.4);
        }
        
        .footer span {
            margin: 0 10px;
        }
        
        /* ===== NOTIFY ===== */
        .notify {
            margin: 25px 0 10px;
        }
        
        .notify .btn {
            border-radius: 50px;
            padding: 12px 28px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        .notify .btn i {
            font-size: 1rem;
        }
        
        .notify .count {
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.7rem;
            margin-top: 10px;
            display: block;
        }
        
        .notify .count span {
            color: #ffd700;
            font-weight: 600;
        }
        
        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            .brand { font-size: 2.4rem; letter-spacing: 1px; }
            .brand-sub { font-size: 0.75rem; letter-spacing: 4px; }
            .message { font-size: 1.1rem; }
            .logo-icon { font-size: 3.5rem; }
            .btn { padding: 10px 20px; font-size: 0.8rem; }
            .notify .btn { width: 100%; justify-content: center; }
            .progress-label { gap: 15px; font-size: 0.6rem; }
            .status-badge { font-size: 0.7rem; padding: 8px 18px; }
        }
        
        @media (min-width: 481px) and (max-width: 768px) {
            .brand { font-size: 2.8rem; }
        }
    </style>
</head>

</body>
</html>
